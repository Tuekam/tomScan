name: Build TomScan APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'  # ← Version récente
          channel: 'stable'
          cache: true
          
      - name: Install dependencies
        working-directory: ./mobile
        run: |
          flutter pub get
          
      - name: Build APK
        working-directory: ./mobile
        run: flutter build apk --release
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TomScan-APK
          path: mobile/build/app/outputs/flutter-apk/app-release.apk