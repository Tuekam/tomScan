name: tomscan
description: TomScan - Détection des maladies de la tomate
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.2
  geolocator: ^14.0.2
  camera: any
  dio: ^5.9.2
  flutter_map: any
  latlong2: any
  flutter_map_marker_cluster: any
  permission_handler: ^12.0.3
  provider: any
  shared_preferences: any
  fl_chart: any
  flutter_markdown: any 
  http: any
  sqflite: any
  path_provider: any 
  share_plus: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/onboarding/
    - assets/images/references/early_blight/
    - assets/images/references/healthy/
    - assets/images/references/late_blight/
    - assets/images/references/yellow_curl/
    - assets/images/references/mold/
    - assets/images/references/septoria_spot/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  background_color: "#ffffff"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"